kind: Pipeline
apiVersion: tekton.dev/v1
metadata:
  name: konflux-build-cli-unit-tests
spec:
  params:
    - description: 'Snapshot of the application'
      name: SNAPSHOT
      type: string
  tasks:
    - name: run-unit-tests
      params:
        - name: SNAPSHOT
          value: "$(params.SNAPSHOT)"
      taskSpec:
        steps:
          - name: clone
            image: quay.io/konflux-ci/task-runner:1.5.0@sha256:200019314a50be5b6dd06f362c794c92a700583a522c5eee9a41e3eab7f706c5
            env:
              - name: PARAM_SNAPSHOT
                value: "$(params.SNAPSHOT)"
            script: |
              #!/bin/bash
              set -ex

              jq -c '.components[0]' >/tmp/component.json <<< "${PARAM_SNAPSHOT}"
              git_url=$(jq -r '.source.git.url' </tmp/component.json)
              git_revision=$(jq -r '.source.git.revision' </tmp/component.json)

              git clone "$git_url" /source
              git config --global --add safe.directory /source

              cd /source
              git checkout "$git_revision"
            volumeMounts:
            - name: source
              mountPath: /source
          - name: run-tests
            image: quay.io/konflux-ci/task-runner:1.5.0@sha256:200019314a50be5b6dd06f362c794c92a700583a522c5eee9a41e3eab7f706c5
            securityContext:
              runAsUser: 0
            computeResources:
              requests:
                memory: 2Gi
              limits:
                memory: 2Gi
            script: |
              #!/bin/bash
              set -ex
              microdnf install -y go
              cd /source
              go test ./pkg/...
            volumeMounts:
            - name: source
              mountPath: /source
        volumes:
        - name: source
          emptyDir: {}
