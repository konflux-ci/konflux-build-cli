kind: Pipeline
apiVersion: tekton.dev/v1
metadata:
  name: konflux-build-cli-unit-tests
spec:
  params:
    - description: 'Snapshot of the application'
      name: SNAPSHOT
      type: string
  tasks:
    - name: run-unit-tests
      params:
        - name: SNAPSHOT
          value: "$(params.SNAPSHOT)"
      taskSpec:
        steps:
          - name: clone
            image: quay.io/konflux-ci/task-runner:1.7.0@sha256:1c0582a85dae0949f3ec94aca95695c5d7698b371f1b76c5a78822a6249073dc
            env:
              - name: PARAM_SNAPSHOT
                value: "$(params.SNAPSHOT)"
            script: |
              #!/bin/bash
              set -ex

              jq -c '.components[0]' >/tmp/component.json <<< "${PARAM_SNAPSHOT}"
              git_url=$(jq -r '.source.git.url' </tmp/component.json)
              git_revision=$(jq -r '.source.git.revision' </tmp/component.json)

              git clone "$git_url" /source
              git config --global --add safe.directory /source

              cd /source
              git checkout "$git_revision"

              # Extract metadata for downstream steps because checkout leaves detached HEAD
              branch=$(git branch -r --points-at HEAD | head -1 | sed 's|.*origin/||; s|^[[:space:]]*||')
              slug=$(echo "$git_url" | sed -E 's|.*github\.com[:/]||; s|\.git$||')
              printf '%s\n%s\n%s\n' "$git_revision" "${branch:-main}" "$slug" > /source/.git-metadata
            volumeMounts:
            - name: source
              mountPath: /source
          - name: run-tests
            image: quay.io/konflux-ci/task-runner:1.7.0@sha256:1c0582a85dae0949f3ec94aca95695c5d7698b371f1b76c5a78822a6249073dc
            securityContext:
              runAsUser: 0
            computeResources:
              requests:
                memory: 4Gi
              limits:
                memory: 4Gi
            script: |
              #!/bin/bash
              set -ex
              microdnf install -y go
              cd /source
              go test -coverprofile=coverage.out -covermode=atomic ./pkg/...
            volumeMounts:
            - name: source
              mountPath: /source
          - name: upload-coverage
            image: quay.io/konflux-ci/task-runner:1.7.0@sha256:1c0582a85dae0949f3ec94aca95695c5d7698b371f1b76c5a78822a6249073dc
            onError: continue
            env:
              - name: CODECOV_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: codecov-token
                    key: CODECOV_TOKEN
            script: |
              #!/bin/bash
              cd /source

              curl -Os https://cli.codecov.io/v11.2.8/linux/codecov
              if ! echo "8930c4bb30254a42f3d8c340706b1be340885e20c0df5160a24efa2e030e662b  codecov" | sha256sum -c -; then
                echo "WARNING: Codecov CLI checksum verification failed, skipping upload"
                exit 1
              fi
              chmod +x codecov
              COMMIT_SHA=$(sed -n '1p' /source/.git-metadata)
              BRANCH=$(sed -n '2p' /source/.git-metadata)
              SLUG=$(sed -n '3p' /source/.git-metadata)
              ./codecov upload-process \
                --token "${CODECOV_TOKEN}" \
                --flag unit-tests \
                --file coverage.out \
                --commit-sha "${COMMIT_SHA}" \
                --branch "${BRANCH}" \
                --slug "${SLUG}" \
                --git-service github || echo "WARNING: Coverage upload failed"
            volumeMounts:
            - name: source
              mountPath: /source
        volumes:
        - name: source
          emptyDir: {}
