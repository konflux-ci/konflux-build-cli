kind: Pipeline
apiVersion: tekton.dev/v1
metadata:
  name: konflux-build-cli-integration-tests
spec:
  params:
    - name: SNAPSHOT
      type: string
      description: 'Snapshot of the application'
    - name: host-access-secret-name
      type: string
      description: 'secret name containing the ssh credentials'
      default: ssh-secrets-$(context.pipelineRun.name)
  tasks:
    - name: provision-virtual-machine
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/tekton-integration-catalog.git
          # using a stable version of fedora-vm-provision task, need to be updated when next stable version of the task is available
          - name: revision
            value: eb2ed3198212e2bab0a347df57365c0737cf012c
          - name: pathInRepo
            value: tasks/mapt-oci/fedora-virtual-machine/provision/0.1/fedora-vm-provision.yaml
      params:
        - name: secret-aws-credentials
          value: mapt-kind-secret
        - name: id
          value: $(context.pipelineRun.name)
        - name: host-access-secret-name
          value: $(params.host-access-secret-name)
        - name: tags
          value: 'owner=konflux-devprod@redhat.com,project=Konflux,created-by=integration-pipeline,component=konflux-build-cli'
        - name: ownerKind
          value: PipelineRun
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)
        - name: spot
          value: 'false'
        - name: debug
          value: 'false'
    - name: run-integration-tests
      runAfter:
        - provision-virtual-machine
      params:
        - name: SNAPSHOT
          value: "$(params.SNAPSHOT)"
      taskSpec:
        steps:
          - name: clone-repo-and-run-tests
            image: quay.io/konflux-ci/task-runner:1.4.1@sha256:d9feec6f2ce9b10cfb76b45ea14f83b5ed9f231de7d6083291550aebe8eb09ea
            env:
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: $(params.host-access-secret-name)
                  key: username
            - name: HOST
              valueFrom:
                secretKeyRef:
                  name: $(params.host-access-secret-name)
                  key: host
            - name: ID_RSA
              valueFrom:
                secretKeyRef:
                  name: $(params.host-access-secret-name)
                  key: id_rsa
            - name: PARAM_SNAPSHOT
              value: "$(params.SNAPSHOT)"
            script: |
              #!/bin/bash
              set -e

              # Setup local SSH configuration directory
              mkdir -p ~/.ssh
              chmod 700 ~/.ssh

              # create the id_rsa and adjust permission
              echo -n "${ID_RSA}" > ~/.ssh/id_rsa
              trap 'rm -f ~/.ssh/id_rsa' EXIT
              chmod 600 ~/.ssh/id_rsa

              # Disable strict host checking
              echo "StrictHostKeyChecking accept-new" >> ~/.ssh/config
              
              # Extract git_url and git_revision from snapshot
              jq -c '.components[0]' >/tmp/component.json <<< "${PARAM_SNAPSHOT}"
              git_url=$(jq -r '.source.git.url' </tmp/component.json)
              git_revision=$(jq -r '.source.git.revision' </tmp/component.json)

              # Validate git_url and git_revision
              [[ -z "$git_url" || "$git_url" == "null" ]] && echo 'ERROR: git_url not found in SNAPSHOT' && exit 1
              [[ -z "$git_revision" || "$git_revision" == "null" ]] && echo 'ERROR: git_revision not found in SNAPSHOT' && exit 1
              
              if [[ $git_revision =~ ^[0-9a-f]{40}$ ]]; then
                echo "Valid Git SHA."
              else
                echo "Error: Invalid Git revision format." >&2
                exit 1
              fi

              # Login and execute the script remotely
              echo "Connecting to ${HOST} as ${USERNAME} ..."
              ssh -i ~/.ssh/id_rsa "${USERNAME}@${HOST}" << EOF
                # install the tools needed for running the tests
                sudo dnf install git golang httpd-tools -y

                # Clone the repo
                mkdir -p ~/source
                git clone "$git_url" ~/source
                git config --global --add safe.directory ~/source
                cd ~/source
                git checkout "$git_revision"

                # Run the integration tests
                go test -v -timeout 20m ./integration_tests
              EOF
  finally:
    - name: deprovision-virtual-machine
      # Inlined from tekton-integration-catalog fedora-vm-deprovision 0.1
      # at revision eb2ed3198212e2bab0a347df57365c0737cf012c
      # with increased memory limits (original: 200Mi/600Mi)
      taskSpec:
        volumes:
          - name: aws-credentials
            secret:
              secretName: mapt-kind-secret
        steps:
          - name: destroy
            image: quay.io/redhat-developer/mapt:v1.0.0-dev
            imagePullPolicy: Always
            env:
              - name: HOME
                value: /opt/mapt/run
            volumeMounts:
              - name: aws-credentials
                mountPath: /opt/aws-credentials
            script: |
              #!/bin/bash

              set -euo pipefail

              echo "deprovision: inlined taskSpec, memory limit 2Gi"

              AWS_ACCESS_KEY_ID=$(cat /opt/aws-credentials/access-key)
              export AWS_ACCESS_KEY_ID
              AWS_SECRET_ACCESS_KEY=$(cat /opt/aws-credentials/secret-key)
              export AWS_SECRET_ACCESS_KEY
              AWS_DEFAULT_REGION=$(cat /opt/aws-credentials/region)
              export AWS_DEFAULT_REGION
              BUCKET=$(cat /opt/aws-credentials/bucket)

              cmd="mapt aws fedora destroy "
              cmd+="--project-name mapt-fedora-$(context.pipelineRun.name) "
              cmd+="--backed-url s3://${BUCKET}/mapt/fedora/$(context.pipelineRun.name) "
              cmd+="--force-destroy "

              eval "${cmd}"

              echo "memory.peak: $(cat /sys/fs/cgroup/memory.peak 2>/dev/null || cat /sys/fs/cgroup/memory/memory.max_usage_in_bytes 2>/dev/null || echo unknown)"

            computeResources:
              requests:
                memory: "2Gi"
                cpu: "100m"
              limits:
                memory: "2Gi"
