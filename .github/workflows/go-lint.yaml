name: go lint

"on":
  pull_request:
    branches:
      - main

jobs:
  go-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
        # Get main branch so linters can distinguish between newly added commits and commits which are already in main
      - name: Pull main branch
        run: git fetch origin main:main

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          #!/bin/bash
          set -o errexit -o nounset -o pipefail

          unformatted=$(gofmt -l .)

          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not formatted:"
            echo "$unformatted"
            echo "Please run 'gofmt -w .' and commit the changes."
            exit 1
          fi

      - name: Check if dependencies are tidy
        run: |
          #!/bin/bash
          set -o errexit -o nounset -o pipefail

          go mod tidy

          if ! git diff --quiet; then
            git diff --color
            echo "::error::go mod tidy made changes"
            echo "Please run 'go mod tidy' and commit the changes."
            exit 1
          fi

      - name: Run linters
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12
